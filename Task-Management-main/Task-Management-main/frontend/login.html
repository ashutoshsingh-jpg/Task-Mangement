<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Task Management System</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png" />
</head>
<body>
  <!-- Full page wrapper: centers the login card vertically and horizontally -->
  <main class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="login-card card border-0 shadow-lg" id="loginCard">
      <div class="card-body p-4 p-md-5">

        <!-- Logo + Heading -->
        <div class="text-center mb-4">
          <img
            src="assets/logo.png"
            alt="Task Management System Logo"
            class="login-logo mb-3"
            width="72"
            height="72"
          />
          <h1 class="h4 fw-bold mb-1 login-title">Task Management System</h1>
          <p class="text-muted mb-0 login-subtitle">Login to continue</p>
        </div>

        <!-- Alert placeholder for failed login / errors -->
        <div
          id="loginAlert"
          class="alert alert-danger d-none"
          role="alert"
          aria-live="assertive"
        ></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate autocomplete="off">
          <!-- Username Field -->
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="Username"
              aria-describedby="usernameError"
              autocomplete="username"
              required
              minlength="4"
            />
            <label for="username">Username</label>
            <div class="invalid-feedback" id="usernameError">
              Username is required and must be at least 4 characters.
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-floating mb-2 position-relative">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="Password"
              aria-describedby="passwordError"
              autocomplete="current-password"
              required
              minlength="6"
            />
            <label for="password">Password</label>
            <div class="invalid-feedback" id="passwordError">
              Password is required and must be at least 6 characters.
            </div>
          </div>

          <!-- Show Password + Remember Me -->
          <div class="d-flex justify-content-between align-items-center mb-3 mt-2 flex-wrap">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="showPassword"
              />
              <label class="form-check-label small" for="showPassword">
                Show password
              </label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="rememberMe"
              />
              <label class="form-check-label small" for="rememberMe">
                Remember me
              </label>
            </div>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="btn btn-primary btn-lg w-100 login-btn"
            id="loginBtn"
          >
            <span id="loginBtnText">Login</span>
            <span
              id="loginSpinner"
              class="spinner-border spinner-border-sm ms-2 d-none"
              role="status"
              aria-hidden="true"
            ></span>
          </button>

          <!-- Forgot Password -->
          <div class="text-center mt-3">
            <a
              href="#"
              id="forgotPasswordLink"
              class="text-decoration-none small"
              data-bs-toggle="modal"
              data-bs-target="#forgotPasswordModal"
            >
              Forgot password?
            </a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Forgot Password Modal -->
  <div
    class="modal fade"
    id="forgotPasswordModal"
    tabindex="-1"
    aria-labelledby="forgotPasswordModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="forgotPasswordModalLabel">
            Forgot Password
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <p class="mb-0">Feature coming soon.</p>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-primary"
            data-bs-dismiss="modal"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JavaScript -->
  <script src="js/login.js"></script>
</body>
</html>
